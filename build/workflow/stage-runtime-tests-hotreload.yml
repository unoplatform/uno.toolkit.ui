jobs:
  - job: RuntimeTests_HotReload
    displayName: Hot-Reload Runtime Tests (Debug)
    timeoutInMinutes: 60
    cancelTimeoutInMinutes: 1

    pool:
      vmImage: ubuntu-latest

    variables:
      NUGET_PACKAGES: $(build.sourcesdirectory)/.nuget
      SAMPLE_DIR: Uno.Toolkit.Samples.Material
      SAMPLE_CSPROJ: MaterialSampleApp

    steps:
      - checkout: self
        clean: true

      - template: templates/host-cleanup-linux.yml

      - template: templates/dotnet-workload-install-linux.yml
        parameters:
          UnoCheckParameters: '--tfm net10.0-desktop'

      - template: templates/canary-updater.yml

      - bash: |
          dotnet build -c Debug -f net10.0-desktop \
            samples/$(SAMPLE_DIR)/$(SAMPLE_CSPROJ).csproj \
            -bl:$(build.artifactstagingdirectory)/binlogs/build-desktop-debug.binlog \
            -p:GeneratePackageOnBuild=false \
            -p:TargetFrameworkOverride=desktop
        displayName: Build MaterialSampleApp Desktop (Debug)

      - task: PublishBuildArtifacts@1
        retryCountOnTaskFailure: 3
        condition: always()
        displayName: Publish binlogs
        inputs:
          PathtoPublish: $(build.artifactstagingdirectory)/binlogs
          ArtifactName: binlogs-desktop-hotreload
          ArtifactType: Container

      - script: |
          chmod +x build/workflow/scripts/linux-skia-runtime-tests.sh
          build/workflow/scripts/linux-skia-runtime-tests.sh
        displayName: Run hot-reload tests
        env:
          SamplesAppArtifactPath: $(Build.SourcesDirectory)/samples/$(SAMPLE_DIR)/bin/Debug/net10.0-desktop
          SAMPLES_APP_DLL: $(SAMPLE_CSPROJ).dll
          UNO_RUNTIME_TESTS_RUN_TESTS: '{"Filter": {"Value": "_HotReload"}}'

      - task: PublishTestResults@2
        condition: always()
        inputs:
          testRunTitle: 'Hot-Reload Runtime Tests'
          testResultsFormat: 'NUnit'
          testResultsFiles: '$(Build.SourcesDirectory)/build/desktop-runtime-tests-results.xml'
          failTaskOnFailedTests: true
          failTaskOnMissingResultsFile: true

