jobs:
- job: WinAppSDK
  cancelTimeoutInMinutes: 0

  strategy:
    matrix:
      Material:
        SAMPLE_DIR: Uno.Toolkit.Samples.Material
        SAMPLE_CSPROJ: MaterialSampleApp
        ARTIFACT_SUFFIX: material
      Cupertino:
        SAMPLE_DIR: Uno.Toolkit.Samples.Cupertino
        SAMPLE_CSPROJ: CupertinoSampleApp
        ARTIFACT_SUFFIX: cupertino

  pool:
    vmImage: windows-latest

  variables:
    - name: PublishReadyToRun 
      value: true

  steps:
  - template: templates/canary-updater.yml
  - template: templates/gitversion.yml
  - template: templates/set-app-versions.yml

  - task: UseDotNet@2
    displayName: 'Use .NET'
    inputs:
      packageType: 'sdk'
      version: '10.0.102'
  
  - script: |
      cd $(build.sourcesdirectory)/samples/$(SAMPLE_DIR)
      dotnet publish -c Release -f net10.0-windows10.0.26100 -p:TargetFrameworkOverride=windows -p:Platform=x64 -p:RuntimeIdentifier=win-x64 -p:PublishUnsignedPackage=true -bl:$(build.artifactstagingdirectory)/build-winappsdk-$(ARTIFACT_SUFFIX).binlog

  - task: CopyFiles@2
    displayName: 'Publish Binaries'
    retryCountOnTaskFailure: 3
    inputs:
      SourceFolder: $(build.sourcesdirectory)/samples/$(SAMPLE_DIR)/bin/Release/net10.0-windows10.0.26100
      TargetFolder: $(build.artifactstagingdirectory)/bin
      CleanTargetFolder: false
      OverWrite: false
      flattenFolders: false

  - task: PublishBuildArtifacts@1
    retryCountOnTaskFailure: 3
    condition: always()
    inputs:
      ArtifactName: winappsdk-$(ARTIFACT_SUFFIX)
