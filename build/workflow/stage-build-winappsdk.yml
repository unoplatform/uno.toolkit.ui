jobs:
- job: WinAppSDK
  cancelTimeoutInMinutes: 0

  strategy:
    matrix:
      Material:
        SAMPLE_DIR: Uno.Toolkit.Samples.Material
        SAMPLE_CSPROJ: MaterialSampleApp
        ARTIFACT_SUFFIX: material
      Cupertino:
        SAMPLE_DIR: Uno.Toolkit.Samples.Cupertino
        SAMPLE_CSPROJ: CupertinoSampleApp
        ARTIFACT_SUFFIX: cupertino

  pool:
    vmImage: windows-2022

  variables:
    - name: PublishReadyToRun 
      value: true

  steps:
  - template: templates/canary-updater.yml
  - template: templates/gitversion.yml
  - template: templates/set-app-versions.yml

  # - task: NuGetCommand@2
  #   displayName: 'NuGet restore'
  #   inputs:
  #     command: 'restore'
  #     restoreSolution: $(build.sourcesdirectory)/src/Uno.Toolkit.sln
  #     feedsToUse: 'config'
  #     noCache: true

  - task: MSBuild@1
    inputs:
      solution: $(build.sourcesdirectory)/samples/$(SAMPLE_DIR)/$(SAMPLE_CSPROJ).csproj
      msbuildLocationMethod: version
      msbuildVersion: latest
      msbuildArchitecture: x64
      msbuildArguments: /t:Publish /m /v:m /p:TargetFramework=net10.0-windows10.0.26100 /p:TargetFrameworkOverride=windows /p:Configuration=Release /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:PublishUnsignedPackage=true /detailedsummary /bl:$(build.artifactstagingdirectory)/build-winappsdk-$(ARTIFACT_SUFFIX).binlog
      clean: false
      configuration: Release
      logProjectEvents: false
      createLogFile: false

  - task: CopyFiles@2
    displayName: 'Publish Binaries'
    retryCountOnTaskFailure: 3
    inputs:
      SourceFolder: $(build.sourcesdirectory)/samples/$(SAMPLE_DIR)/bin/Release/net10.0-windows10.0.26100
      TargetFolder: $(build.artifactstagingdirectory)/bin
      CleanTargetFolder: false
      OverWrite: false
      flattenFolders: false

  - task: PublishBuildArtifacts@1
    retryCountOnTaskFailure: 3
    condition: always()
    inputs:
      ArtifactName: winappsdk-$(ARTIFACT_SUFFIX)
