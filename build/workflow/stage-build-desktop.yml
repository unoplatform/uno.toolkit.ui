jobs:
  - job: Build_Desktop
    displayName: Build Desktop

    strategy:
      matrix:
        Material:
          SAMPLE_DIR: Uno.Toolkit.Samples.Material
          SAMPLE_CSPROJ: MaterialSampleApp
          ARTIFACT_SUFFIX: material
        Cupertino:
          SAMPLE_DIR: Uno.Toolkit.Samples.Cupertino
          SAMPLE_CSPROJ: CupertinoSampleApp
          ARTIFACT_SUFFIX: cupertino

    pool:
      vmImage: ubuntu-latest

    variables:
      NUGET_PACKAGES: $(build.sourcesdirectory)/.nuget

    steps:
      - checkout: self
        clean: true

      - template: templates/dotnet-workload-install-linux.yml
        parameters:
          UnoCheckParameters: '--tfm net10.0-desktop'

      - template: templates/canary-updater.yml

      - bash: |
          dotnet publish -c Release -f net10.0-desktop \
            samples/$(SAMPLE_DIR)/$(SAMPLE_CSPROJ).csproj \
            -bl:$(build.artifactstagingdirectory)/binlogs/build-desktop-$(ARTIFACT_SUFFIX).binlog \
            -o $(build.artifactstagingdirectory)/desktop \
            -p:GeneratePackageOnBuild=false \
            -p:TargetFrameworkOverride=desktop \
            -p:PublishTrimmed=false
        displayName: Publish $(SAMPLE_DIR) Desktop App

      - task: PublishBuildArtifacts@1
        retryCountOnTaskFailure: 3
        condition: always()
        displayName: Publish binlogs
        inputs:
          PathtoPublish: $(build.artifactstagingdirectory)/binlogs
          ArtifactName: binlogs-desktop-$(ARTIFACT_SUFFIX)
          ArtifactType: Container

      - task: PublishPipelineArtifact@1
        retryCountOnTaskFailure: 3
        inputs:
          targetPath: $(build.artifactstagingdirectory)/desktop
          artifactName: desktop-$(ARTIFACT_SUFFIX)
