jobs:
- job: iOS
  cancelTimeoutInMinutes: 0

  timeoutInMinutes: 90

  strategy:
    matrix:
      Material:
        SAMPLE_DIR: Uno.Toolkit.Samples.Material
        SAMPLE_CSPROJ: MaterialSampleApp
        ARTIFACT_SUFFIX: material
      Cupertino:
        SAMPLE_DIR: Uno.Toolkit.Samples.Cupertino
        SAMPLE_CSPROJ: CupertinoSampleApp
        ARTIFACT_SUFFIX: cupertino

  pool:
    vmImage: 'macOS-15'

  variables:
    - name: ApplicationBuildNumberOffset
      value: 50
    - name: VersionCodeOffset
      value: 50
    - name: CI_Build
      value: true

  steps:

  - template: templates/dotnet-workload-install-mac.yml
    parameters:
      UnoCheckParameters: '--tfm net10.0-ios --tfm net10.0-maccatalyst'

  - template: templates/xcode-select.yml
    parameters:
      xCodeRoot: $(XCODE_ROOT)

  - template: templates/canary-updater.yml
  - template: templates/gitversion.yml
  - template: templates/set-app-versions.yml
  - template: templates/xcode-select.yml
    parameters:
      xCodeRoot: $(XCODE_ROOT)

  - bash: |
      cd $(build.sourcesdirectory)/samples/$(SAMPLE_DIR)
      echo "BUILD_SOURCEBRANCH: $BUILD_SOURCEBRANCH"
      dotnet build -f net10.0-ios -p:TargetFrameworkOverride=ios -c Release "/p:InformationalVersion=%NBGV_InformationalVersion%" "/bl:$(build.artifactstagingdirectory)/toolkit-build-ios-$(ARTIFACT_SUFFIX).binlog"
    displayName: Build $(SAMPLE_DIR) for Release - (net10.0-ios)

  - task: CopyFiles@2
    displayName: 'Publish Binaries'
    retryCountOnTaskFailure: 3
    inputs:
      SourceFolder: $(build.sourcesdirectory)/samples/$(SAMPLE_DIR)/bin/Release/net10.0-ios
      Contents: |
        **/*.ipa
      TargetFolder: $(build.artifactstagingdirectory)
      CleanTargetFolder: false
      OverWrite: false
      flattenFolders: false

  - task: PublishBuildArtifacts@1
    retryCountOnTaskFailure: 3
    condition: always()
    inputs:
      ArtifactName: ios-$(ARTIFACT_SUFFIX)

- job: iOS_UITest_Build
  cancelTimeoutInMinutes: 0

  timeoutInMinutes: 90

  variables:
    ArtifactName: ios-winui-uitest-build
    CI_Build: true

  pool:
    vmImage: 'macOS-15'

  steps:
  - template: templates/dotnet-workload-install-mac.yml
    parameters:
      UnoCheckParameters: '--tfm net10.0-ios'

  - template: templates/canary-updater.yml

  - template: templates/xcode-select.yml
    parameters:
      xCodeRoot: $(XCODE_ROOT)

  - bash: |
      chmod +x $(build.sourcesdirectory)/build/workflow/scripts/ios-uitest-build.sh
      $(build.sourcesdirectory)/build/workflow/scripts/ios-uitest-build.sh

    displayName: Build iOS App for UI Tests

    env:
      BUILD_SOURCESDIRECTORY: "$(build.sourcesdirectory)"
      BUILD_ARTIFACTSTAGINGDIRECTORY: "$(build.artifactstagingdirectory)"
      SAMPLE_APP_NAME: "Uno.Toolkit.Samples"

  - task: CopyFiles@2
    displayName: 'Publish Binaries'
    retryCountOnTaskFailure: 3
    inputs:
      SourceFolder: $(build.sourcesdirectory)/samples/Uno.Toolkit.Samples.Material/bin/Release/net10.0-ios/iossimulator-x64/MaterialSampleApp.app
      Contents: '**'
      TargetFolder: $(build.artifactstagingdirectory)/MaterialSampleApp.app
      CleanTargetFolder: false
      OverWrite: false
      flattenFolders: false

  - task: PublishBuildArtifacts@1
    retryCountOnTaskFailure: 3
    condition: always()
    inputs:
      ArtifactName: $(ArtifactName)
